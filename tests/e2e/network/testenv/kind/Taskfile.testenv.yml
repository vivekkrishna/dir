version: "3"

includes:
  setup-testenv-k8s:
    taskfile: "../../../../../tests/modules/Taskfile.setup-testenv-k8s.yml"
    flatten: true # Expose included tasks (up/down)
    vars:
      KIND_CLUSTER_NAME: "e2e-network-kind-testenv"
      KIND_CONFIG_PATH: "{{.ROOT_DIR}}/tests/e2e/network/testenv/kind/kind-cluster.yaml"
      KIND_EXTRA_IMAGES: |
        ghcr.io/agntcy/dir-reconciler:{{.IMAGE_TAG}}
        ghcr.io/agntcy/dir-apiserver:{{.IMAGE_TAG}}
      CHART_DEPLOYMENTS: |
        [
          {
            "release_name": "bootstrap",
            "namespace": "bootstrap",
            "chart_path": "{{.ROOT_DIR}}/install/charts/dir",
            "chart_values_path": "{{.ROOT_DIR}}/tests/e2e/network/testenv/kind/dir-chart-values-bootstrap.yaml",
            "chart_extra_values": [
              "--set apiserver.image.tag={{.IMAGE_TAG}}",
              "--set apiserver.reconciler.image.tag={{.IMAGE_TAG}}"
            ]
          },
          {
            "release_name": "peer1",
            "namespace": "peer1",
            "chart_path": "{{.ROOT_DIR}}/install/charts/dir",
            "chart_values_path": "{{.ROOT_DIR}}/tests/e2e/network/testenv/kind/dir-chart-values-peer1.yaml",
            "chart_extra_values": [
              "--set apiserver.image.tag={{.IMAGE_TAG}}",
              "--set apiserver.reconciler.image.tag={{.IMAGE_TAG}}"
            ]
          },
          {
            "release_name": "peer2",
            "namespace": "peer2",
            "chart_path": "{{.ROOT_DIR}}/install/charts/dir",
            "chart_values_path": "{{.ROOT_DIR}}/tests/e2e/network/testenv/kind/dir-chart-values-peer2.yaml",
            "chart_extra_values": [
              "--set apiserver.image.tag={{.IMAGE_TAG}}",
              "--set apiserver.reconciler.image.tag={{.IMAGE_TAG}}"
            ]
          },
          {
            "release_name": "peer3",
            "namespace": "peer3",
            "chart_path": "{{.ROOT_DIR}}/install/charts/dir",
            "chart_values_path": "{{.ROOT_DIR}}/tests/e2e/network/testenv/kind/dir-chart-values-peer3.yaml",
            "chart_extra_values": [
              "--set apiserver.image.tag={{.IMAGE_TAG}}",
              "--set apiserver.reconciler.image.tag={{.IMAGE_TAG}}"
            ]
          }
        ]

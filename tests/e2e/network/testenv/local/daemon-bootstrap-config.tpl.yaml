server:
  listen_address: "localhost:0"
  metrics:
    enabled: false
  oasf_api_validation:
    schema_url: "https://schema.oasf.outshift.com"
  store:
    provider: "oci"
    oci:
      local_dir: "store"
      registry_address: "localhost:13000"
      repository_name: "dir"
      auth_config:
        insecure: true
  routing:
    refresh_interval: "1s"
    listen_address: "/ip4/127.0.0.1/tcp/18300"
    key_path: "${BOOTSTRAP_KEY_PATH}"
    datastore_dir: "routing"
    gossipsub:
      enabled: true
  database:
    type: "sqlite"
    sqlite:
      path: "dir.db"
  publication:
    scheduler_interval: 1h
    worker_count: 1
    worker_timeout: 30m
  naming:
    ttl: 168h

reconciler:
  regsync:
    enabled: true
    interval: 10s
  indexer:
    enabled: true
    interval: 10s
  signature:
    enabled: true
    interval: 10s
    ttl: 168h
    record_timeout: 30s
  name:
    enabled: true
    interval: 10s
    ttl: 168h
    record_timeout: 30s

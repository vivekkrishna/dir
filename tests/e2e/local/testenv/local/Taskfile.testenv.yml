version: "3"

includes:
  setup-dir-node:
    taskfile: "../../../../../tests/modules/Taskfile.setup-dir-node.yml"
    internal: true # Import tasks without exposing
    vars:
      DIRCTL_DATA_PATH: "/tmp/e2e-local-local-testenv"
      DIRCTL_CONFIG_PATH: "{{.ROOT_DIR}}/tests/e2e/local/testenv/local/dir-daemon-config.yaml"
      DIRCTL_LOGFILE_PATH:  "{{.ROOT_DIR}}/tests/e2e/local/testenv/local/logs.daemon.log"

tasks:
  up:
    vars:
      COMPOSE_PATH: "{{.ROOT_DIR}}/tests/e2e/local/testenv/local/docker-compose.yaml"
    cmds:
      # Start the Docker Compose services
      - |
        docker compose -f {{.COMPOSE_PATH}} up --wait -d
        sleep 10
      
      # Start the directory node
      - task: setup-dir-node:up

  down:
    vars:
      COMPOSE_PATH: "{{.ROOT_DIR}}/tests/e2e/local/testenv/local/docker-compose.yaml"
    cmds:
      # Stop the directory node
      - task: setup-dir-node:down

      # Stop the Docker Compose services
      - |
        docker compose -f {{.COMPOSE_PATH}} down

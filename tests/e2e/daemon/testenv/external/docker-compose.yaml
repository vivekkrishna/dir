name: daemon-external

services:
  zot:
    image: ghcr.io/project-zot/zot:v2.1.16
    ports:
      - "25555:5000"
    deploy:
      restart_policy:
        condition: on-failure

  postgres:
    image: docker.io/bitnami/postgresql:latest@sha256:c30c796dcf96a67a405b905bf6aaf8d6c957d5c2fe729db6e67e2760e21fd9f8
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: directory
    ports:
      - "25432:5432"
    deploy:
      restart_policy:
        condition: on-failure
    healthcheck:
      test: pg_isready -U postgres -d directory || exit 1
      interval: 5s
      retries: 30
      start_period: 5s

  # Service used for runtime discovery
  service-a2a:
    image: nginx:latest@sha256:7f0adca1fc6c29c8dc49a2e90037a10ba20dc266baaed0988e9fb4d0d8b85ba0
    labels:
      - "test.org.agntcy/discover=true"
      - "test.org.agntcy/agent-type=a2a"
      # Reference to the sample record for runtime discovery
      - "test.org.agntcy/agent-record=baeareiabbog2umgduqhlcb64fzt6adn34kblzvru\
        3fdzkl75hjhwt6h3da"
    volumes:
      - ./workload.a2a-card.json:/usr/share/nginx/html/.well-known/agent-card.json
    ports:
      - 80

server:
  listen_address: "localhost:19234"
  metrics:
    enabled: false
  oasf_api_validation:
    schema_url: "https://schema.oasf.outshift.com"
  store:
    provider: "oci"
    oci:
      registry_address: "localhost:25555"
      repository_name: "dir"
      auth_config:
        insecure: true
    verification:
      enabled: true
  routing:
    listen_address: "/ip4/127.0.0.1/tcp/0"
    datastore_dir: "routing"
    gossipsub:
      enabled: true
  database:
    type: "postgres"
    postgres:
      username: "postgres"
      password: "postgres"
      host: "localhost"
      port: 25432
      database: "directory"
      ssl_mode: "disable"
  publication:
    scheduler_interval: 1h
    worker_count: 1
    worker_timeout: 30m
  naming:
    ttl: 168h

reconciler:
  local_registry:
    registry_address: "localhost:25555"
    repository_name: "dir"
    auth_config:
      insecure: true
  regsync:
    enabled: true
    interval: 10s
  indexer:
    enabled: true
    interval: 10s
  signature:
    enabled: true
    interval: 10s
    ttl: 168h
    record_timeout: 30s
  name:
    enabled: true
    interval: 10s
    ttl: 168h
    record_timeout: 30s

# Override the default label key used for runtime discovery to match the label used in the test workload.
# This ensures the tests do not interfere with other containers on the host that may have the default label key.
runtime:
  enabled: true

  adapter:
    type: "docker"
    docker:
      host: "unix:///var/run/docker.sock"
      label_key: "test.org.agntcy/discover"

  resolver:
    a2a:
      enabled: true
      label_key: "test.org.agntcy/agent-type"
    oasf:
      enabled: true
      label_key: "test.org.agntcy/agent-record"
      client:
        server_address: "localhost:19234"
        auth_mode: "insecure"

  store:
    # Use SQLite for runtime store to avoid conflicts with the PostgreSQL database used by the server.
    # This is an ephemeral store that only holds runtime state and does not need to be shared with the server.
    type: "sqlite"

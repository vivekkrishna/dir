version: "3"

tasks:
  default:
    cmd: echo "Run the main Taskfile instead of this one."

  api:gen:
    desc: Generates API stubs
    dir: ./proto
    deps:
      - task: deps:protoc
      - task: deps:bufbuild
    # NOTE(ramizpolic): This allows Taskfile YAML parsing to accept '{' as a starting command token.
    # In translation, this is interpreted as a regular multi-line shell script.
    cmds:
      - "{{.BUFBUILD_BIN}} dep update"
      - "{{.BUFBUILD_BIN}} generate --template buf.gen.yaml"
      - task: runtime:gen

  runtime:gen:
    desc: Generate DeepCopy/DeepCopyObject methods for the runtime CRD types
    dir: ./api
    deps:
      - deps:controller-gen
    cmds:
      # NOTE: CRD YAML manifests are generated in the dir-runtime repo (alongside its Helm chart).
      - go run {{ .CONTROLLER_GEN_BIN }} object:headerFile="./runtime/crd/v1/boilerplate.go.txt" paths="./runtime/crd/v1/..."

  api:clean:
    desc: Clean generated API stubs
    dir: ./api
    cmds:
      - find . \( -name "*.pb.go" \) -type f -delete


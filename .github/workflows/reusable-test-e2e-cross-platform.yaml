name: Test E2E Cross-Platform

on:
  workflow_call:

jobs:
  cross-platform:
    name: Cross-Platform Test ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: Linux
          - runner: macos-latest
            label: macOS
          - runner: windows-latest
            label: Windows
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 #v2.0.0

      - name: Setup Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: "**/*.sum"
          cache: true

      - name: Compile CLI
        run: task cli:compile

      - name: Run daemon smoke tests (default backend)
        env:
          DIRECTORY_CLIENT_SERVER_ADDRESS: localhost:8888
          # TODO(paralta): drop once dir-runtime is republished against github.com/agntcy/dir/api/runtime
          # so that the linked dirctl binary no longer registers the same proto descriptors twice.
          GOLANG_PROTOBUF_REGISTRATION_CONFLICT: warn
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            DIRCTL_BIN=".bin/dirctl.exe"
          else
            DIRCTL_BIN=".bin/dirctl"
          fi

          DATA_DIR=$(mktemp -d)

          "$DIRCTL_BIN" daemon start --data-dir "$DATA_DIR" &

          go test -C ./tests/e2e/daemon . -v -failfast -test.v -test.paniconexit0 -ginkgo.timeout 5m -timeout 5m -ginkgo.v
